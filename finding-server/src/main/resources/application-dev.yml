spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finding?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3

# MinIO 对象存储
minio:
  endpoint: http://localhost:9002
  access-key: admin
  secret-key: admin123456
  bucket: finding

logging:
  level:
    com.finding: debug
    org.springframework.security: debug
