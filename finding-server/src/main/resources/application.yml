server:
  port: 8080

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.finding.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  access-secret: finding-access-secret-key-must-be-at-least-256-bits-long-for-hs256
  refresh-secret: finding-refresh-secret-key-must-be-at-least-256-bits-long-too
  access-expiration: 7200000    # 2 hours
  refresh-expiration: 604800000  # 7 days

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

# File upload
finding:
  upload:
    path: ./uploads
    max-size: 5242880   # 5MB
    allowed-types: image/jpeg,image/png,image/webp
