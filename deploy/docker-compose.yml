# ============================================================
# Finding 大学生社交平台 - Docker 中间件编排
# 包含: MySQL 8.0, Redis 7, RabbitMQ 3.12, MinIO, Nginx
# ============================================================

version: "3.9"

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: finding-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Finding@2026}
      MYSQL_DATABASE: finding
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 初始化 SQL（首次启动自动建表）
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # 数据持久化
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
    networks:
      - finding-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Finding@2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: finding-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-Finding@2026}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finding-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Finding@2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RabbitMQ 3.12 ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: finding-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Finding@2026}
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - finding-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: finding-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-Finding@2026}
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # API (S3 兼容)
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    networks:
      - finding-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Nginx (前端 + 反向代理) ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: finding-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 学生端前端构建产物
      - ../finding-web/dist:/usr/share/nginx/html:ro
      # 管理端前端构建产物
      - ../finding-admin/dist:/usr/share/nginx/admin:ro
      # Nginx 配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书 (部署时替换真实证书)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # 日志
      - nginx_logs:/var/log/nginx
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    networks:
      - finding-net

# ==================== 数据卷（持久化） ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  nginx_logs:
    driver: local

# ==================== 网络 ====================
networks:
  finding-net:
    driver: bridge
